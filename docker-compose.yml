version: '3.8'

services:
  # PostgreSQL for user accounts and email metadata
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: coldforge_email
      POSTGRES_USER: email_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U email_user -d coldforge_email"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for session/cache management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Coldforge Email backend service
  coldforge-email:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - LOG_LEVEL=debug
      - ENVIRONMENT=development
      - LISTEN_ADDR=0.0.0.0:8080
      - METRICS_ADDR=0.0.0.0:9090
      - DATABASE_URL=postgres://email_user:dev_password@postgres:5432/coldforge_email
      - REDIS_URL=redis://redis:6379
      - SMTP_HOST=localhost
      - SMTP_PORT=587
      # Inbound SMTP (disabled by default in dev)
      - SMTP_INBOUND_ENABLED=false
      - SMTP_INBOUND_ADDR=0.0.0.0:25
      - SMTP_INBOUND_DOMAIN=coldforge.xyz
      - SMTP_INBOUND_DOMAINS=coldforge.xyz
      - NSECBUNKER_RELAY_URL=ws://localhost:4737
      - IDENTITY_SERVICE_URL=http://localhost:3000
    ports:
      - "8080:8080"   # API
      - "9090:9090"   # Metrics/health
      - "25:25"       # SMTP inbound (requires SMTP_INBOUND_ENABLED=true)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Frontend (TypeScript/React)
  coldforge-email-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - coldforge-email
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:

networks:
  default:
    name: coldforge-email
