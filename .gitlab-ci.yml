stages:
  - test
  - build

test:unit:
  stage: test
  image: golang:1.25-alpine
  script:
    - for i in 1 2 3 4 5; do apk add --no-cache git gcc musl-dev && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
    - go mod download
    - go test -v -race -cover ./...
  coverage: '/coverage: \d+\.\d+% of statements/'

test:lint:
  stage: test
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run ./...
  allow_failure: true

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR} --dockerfile ${CI_PROJECT_DIR}/Dockerfile --destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY_IMAGE}:latest
