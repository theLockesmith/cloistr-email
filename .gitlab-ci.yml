stages:
  - test
  - build

test:unit:
  stage: test
  image: golang:1.21-alpine
  script:
    - for i in 1 2 3 4 5; do apk add --no-cache git gcc musl-dev && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
    - go mod download
    - go test -v -race -cover ./...
  coverage: '/coverage: \d+\.\d+% of statements/'

test:lint:
  stage: test
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run ./...
  allow_failure: true

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR} --dockerfile ${CI_PROJECT_DIR}/Dockerfile --no-push
