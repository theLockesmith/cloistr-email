<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background - original dark -->
  <rect width="64" height="64" rx="12" fill="#1E1E2E"/>

  <!-- Archway frame -->
  <g fill="none" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 14 52 L 14 24 A 18 18 0 0 1 50 24 L 50 52"/>
  </g>

  <!-- Email symbol: envelope -->
  <g fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Envelope body -->
    <rect x="20" y="32" width="24" height="16" rx="2"/>
    <!-- Envelope flap -->
    <path d="M 20 34 L 32 42 L 44 34"/>
  </g>
</svg>
