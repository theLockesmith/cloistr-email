apiVersion: v1
kind: Secret
metadata:
  name: cloistr-email-redis-secret
  namespace: coldforge
  labels:
    app.kubernetes.io/name: cloistr-email
    app.kubernetes.io/component: redis
type: Opaque
stringData:
  REDIS_PASSWORD: CHANGE_ME_SECURE_PASSWORD
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cloistr-email-redis-pvc
  namespace: coldforge
  labels:
    app.kubernetes.io/name: cloistr-email
    app.kubernetes.io/component: redis
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloistr-email-redis
  namespace: coldforge
  labels:
    app.kubernetes.io/name: cloistr-email
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloistr-email
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloistr-email
        app.kubernetes.io/component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - name: redis
          containerPort: 6379
        args:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        - --appendonly
        - "yes"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cloistr-email-redis-secret
              key: REDIS_PASSWORD
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: cloistr-email-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cloistr-email-redis
  namespace: coldforge
  labels:
    app.kubernetes.io/name: cloistr-email
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
    targetPort: redis
  selector:
    app.kubernetes.io/name: cloistr-email
    app.kubernetes.io/component: redis
