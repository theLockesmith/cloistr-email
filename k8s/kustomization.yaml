apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: coldforge

resources:
- namespace.yaml
- configmap.yaml
- secret.yaml
- postgres.yaml
- redis.yaml
- backend-deployment.yaml
- frontend-deployment.yaml
- services.yaml
- ingress.yaml
- hpa.yaml
- monitoring.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "1.0.0"

images:
- name: registry.aegis-hq.xyz/coldforge/cloistr-email
  newTag: latest
- name: registry.aegis-hq.xyz/coldforge/cloistr-email-ui
  newTag: latest
