# WARNING: This is a template. Do not commit actual secrets!
# Use: kubectl create secret generic cloistr-email-secrets --from-env-file=.env.production -n coldforge
# Or use a secrets manager like HashiCorp Vault, Sealed Secrets, or External Secrets Operator

apiVersion: v1
kind: Secret
metadata:
  name: cloistr-email-secrets
  namespace: coldforge
  labels:
    app.kubernetes.io/name: cloistr-email
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  # Database (replace with actual values)
  DATABASE_URL: "postgres://email_user:CHANGE_ME@cloistr-email-postgres:5432/cloistr_email?sslmode=require"

  # Redis
  REDIS_URL: "redis://:CHANGE_ME@cloistr-email-redis:6379/0"

  # SMTP credentials (for relay mode)
  SMTP_HOST: "mail.coldforge.xyz"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""

  # DKIM private key (generate with scripts/generate-dkim-keys.sh)
  DKIM_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE_WITH_ACTUAL_KEY
    -----END RSA PRIVATE KEY-----

  # NIP-46 nsecbunker
  NSECBUNKER_RELAY_URL: "wss://relay.coldforge.xyz"
